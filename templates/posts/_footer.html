<!-- post_footer.html: Appears at the bottom of each post -->
<footer>
    <hr>
    <p style="text-align:center;"></p>
</footer>

<style>
  .snippet {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: monospace;
  }
  .snippet .copy-btn {
    position: relative;
    cursor: pointer;
    border: none;
    background: none;
    padding: 4px;
    color: inherit;
    transition: transform .15s;
    line-height: 0;
  }
  .snippet .ico-check {
    position: absolute;
    top: 4px;
    left: 4px;
    opacity: 0;
    transform: scale(.5);
    transition: opacity .15s, transform .15s;
  }
  .snippet.copied .copy-btn { transform: scale(1.2); }
  .snippet.copied .ico-copy { opacity: 0; }
  .snippet.copied .ico-check { opacity: 1; transform: scale(1); }
</style>


<script>
(function () {
  const BTN_HTML = `
    <button class="copy-btn" title="Copy" aria-label="Copy to clipboard">
      <svg class="ico-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <svg class="ico-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
    </button>`;

  // Inject a button into every .snippet that doesn't already have one
  document.querySelectorAll('.snippet').forEach(s => {
    if (!s.querySelector('.copy-btn')) s.insertAdjacentHTML('beforeend', BTN_HTML);
  });

  // One delegated listener for all snippets
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const snippet = btn.closest('.snippet');
    const text = snippet.querySelector('code').textContent.trim();

    try {
      await navigator.clipboard.writeText(text);
    } catch {
      // Fallback for non-secure contexts (http / file://)
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    snippet.classList.add('copied');
    clearTimeout(snippet._t);
    snippet._t = setTimeout(() => snippet.classList.remove('copied'), 1200);
  });
})();
</script>
